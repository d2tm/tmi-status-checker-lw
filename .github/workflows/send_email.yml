# This is a basic workflow to help you get started with Actions

name: Send the DCP Report Announcement Email

# Controls when the workflow will run
on:
    workflow_dispatch: # manual trigger
    workflow_run:
      workflows: [Auto-generate the Club DCP Report]
      types:
        - completed
      branches:
        - main
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  EMAIL_FROM: ${{ vars.EMAIL_FROM }}
  EMAIL_TO: ${{ vars.EMAIL_TO }}
  EMAIL_CC: ${{ vars.EMAIL_CC }}
  EMAIL_USER: ${{ secrets.EMAIL_USER }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  CLUB_NUMBER: ${{ vars.CLUB_NUMBER }}
  CLUB_NAME: ${{ vars.CLUB_NAME }}
  SEND_NOTIFICATION: ${{ vars.SEND_NOTIFICATION }}
  CHAT_OUTPUT_FORMAT_PROMPT: ${{ vars.CHAT_OUTPUT_FORMAT_PROMPT }}
  IS_CORPORATE_CLUB: ${{ vars.IS_CORPORATE_CLUB }}
  
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  send-notification:
    if: contains(github.repository, 'd2tm/tmi-status-checker')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
    
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true # Added caching to speed up your builds

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' # Added caching for node_modules

      - name: Verify Versions
        run: |
          go version
          node --version
          echo "Built using Go ${{ env.GO_VERSION }} and Node ${{ env.NODE_VERSION }}"

      - name: Install tools
        run: make install-tools

      - name: Send the notification email
        run: make -e send-notification
