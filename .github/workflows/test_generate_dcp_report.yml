# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Test Generate DCP Report

on:
  schedule:
    - cron: '0 0 * * 0' # Runs at 12am UTC every Sunday
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  CLUB_NUMBER: ${{ vars.CLUB_NUMBER }}
  CLUB_NAME: ${{ vars.CLUB_NAME }}
  SEND_NOTIFICATION: ${{ vars.SEND_NOTIFICATION }}
  CHAT_OUTPUT_FORMAT_PROMPT: ${{ vars.CHAT_OUTPUT_FORMAT_PROMPT }}
  IS_CORPORATE_CLUB: ${{ vars.IS_CORPORATE_CLUB }}

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true # Added caching to speed up your builds

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm' # Added caching for node_modules

    - name: Verify Versions
      run: |
        go version
        node --version
        echo "Built using Go ${{ env.GO_VERSION }} and Node ${{ env.NODE_VERSION }}"

    - name: Install tools
      run: make install-tools

    - name: Check code
      run: make lint

    - name: Test Generate DCP Report Yaml/Screenshot and the Notification message using Chat GPT API
      run: make test
