# This is a basic workflow to help you get started with Actions

name: Auto-generate the Club DCP Report

# Controls when the workflow will run
on:
  schedule:
    - cron: '0 12 1 * *' # Runs at 12pm UTC on the 1st day of every month

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
env:
  GO_VERSION: ${{ vars.GO_VERSION }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  GITHUB_TOKEN: ${{ secrets.TMI_DCP_STATUS_API_TOKEN }}
  CLUB_NUMBER: ${{ vars.CLUB_NUMBER }}
    
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  auto-commit-and-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
    
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true # Added caching to speed up your builds

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm' # Added caching for node_modules

      - name: Verify Versions
        run: |
          go version
          node --version
          echo "Built using Go ${{ env.GO_VERSION }} and Node ${{ env.NODE_VERSION }}"

      - name: Install tools
        run: make install-tools

      - name: Test Generate DCP Report Yaml and Screenshot
        run: make generate-all
      
      - name: Add and Commit Changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: 'github-actions[bot]'
          author_email: 'github-actions[bot]@users.noreply.github.com'
          message: 'Auto commit: updated the club dcp report files'
          add: 'reports/*' 
